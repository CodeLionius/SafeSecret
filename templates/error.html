<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Error - SafeSecret</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>

<body data-theme="dark">
  <nav class="container py-4 d-flex justify-content-end gap-2">
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
  </nav>

  <main class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7 col-md-9 text-center">
        <div class="logo">SafeSecret</div>

        <div class="glass-card">
          <div class="mb-4">
            <svg class="icon text-danger mb-3" style="width: 64px; height: 64px;" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <h2 style="color: var(--text-primary); font-family: var(--font-logo);">Oops! Something went wrong</h2>
          </div>

          <div class="alert alert-danger bg-danger bg-opacity-10 border-danger border-opacity-25 text-danger mb-5">
            {{ message if message else "An unexpected error occurred." }}
          </div>

          <p class="text-secondary mb-5">The secret you are looking for may have expired, been viewed already, or been
            destroyed due to too many incorrect PIN attempts.</p>

          <a href="/" class="btn btn-primary w-100">Return Home</a>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>

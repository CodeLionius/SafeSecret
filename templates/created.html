<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Link Created - SafeSecret</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>

<body data-theme="dark">
  <nav class="container py-4 d-flex justify-content-end gap-2">
    <button class="font-btn" id="decrease-font" aria-label="Decrease font">A-</button>
    <button class="font-btn" id="increase-font" aria-label="Increase font">A+</button>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
  </nav>

  <main class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7 col-md-9 text-center">
        <div class="logo">SafeSecret</div>
        <p class="subtitle">Your secure link is ready for sharing</p>

        <div class="glass-card">
          <div class="mb-5">
            <svg class="icon text-success mb-3" style="width: 48px; height: 48px;">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            <h2 style="color: var(--text-primary); font-family: var(--font-logo);">Secret Link Generated</h2>
          </div>

          <div class="mb-4">
            <label class="form-label text-start">Share this Link</label>
            <div class="position-relative">
              <input type="text" id="share-link" class="form-control pe-5" value="{{ share_link }}" readonly>
              <button class="btn btn-sm btn-outline-info position-absolute top-50 end-0 translate-middle-y m-2"
                onclick="copyToClipboard('share-link', 'link-feedback')">
                Copy
              </button>
            </div>
            <div id="link-feedback" class="text-success mt-2" style="display:none; font-size: 0.9rem;">
              Link copied to clipboard!
            </div>
          </div>

          <div
            class="alert alert-info bg-info bg-opacity-10 border-info border-opacity-25 text-info text-start small mb-4">
            <div class="d-flex gap-2">
              <svg class="icon flex-shrink-0" style="width: 18px; height: 18px;">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="16" x2="12" y2="12" />
                <line x1="12" y1="8" x2="12.01" y2="8" />
              </svg>
              <span>Share this link and the PIN with the recipient. The secret will self-destruct once it reaches its
                expiration time or is viewed.</span>
            </div>
          </div>

          <a href="/" class="btn btn-primary w-100">Create Another Secret</a>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>
